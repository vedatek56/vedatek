name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Recommended to prevent concurrent deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: npm

      - name: Install dependencies 📦
        run: npm ci

      - name: Build Next.js app 🚀
        run: npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Next.js static export outputs files in the 'out' folder
          branch: gh-pages # The branch the action will deploy to
